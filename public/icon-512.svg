<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
    <linearGradient id="sticky-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A" />
      <stop offset="100%" style="stop-color:#F59E0B" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Map Pin Path -->
  <g filter="url(#shadow)">
    <path d="M256 80C178.68 80 116 142.68 116 220C116 325 256 432 256 432S396 325 396 220C396 142.68 333.32 80 256 80ZM256 290C217.34 290 186 258.66 186 220C186 181.34 217.34 150 256 150C294.66 150 326 181.34 326 220C326 258.66 294.66 290 256 290Z" fill="white" fill-opacity="0.9" />
  </g>
  
  <!-- Sticky Note -->
  <g transform="rotate(-10 320 300)" filter="url(#shadow)">
    <rect x="220" y="220" width="160" height="160" rx="8" fill="url(#sticky-grad)" />
    <!-- Pin on the sticky -->
    <circle cx="300" cy="240" r="8" fill="#EF4444" />
  </g>
</svg>
