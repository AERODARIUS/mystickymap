<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />
  
  <!-- Visual shadow for the pin -->
  <ellipse cx="256" cy="450" rx="80" ry="15" fill="black" opacity="0.1" />

  <!-- Main Pin Shape -->
  <g filter="url(#shadow)">
    <path 
      d="M256 430C256 430 410 270 410 160C410 77.1573 340.843 10 256 10C171.157 10 102 77.1573 102 160C102 270 256 430 256 430Z" 
      fill="white" 
    />
    <!-- Inner blue dot -->
    <circle cx="256" cy="160" r="45" fill="#1D4ED8" />
  </g>
</svg>
